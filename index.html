    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9eb5, #ffc1cc);
            color: white;
            overflow-x: hidden;
        }

            /* BACKGROUND TANAMAN */
            body::before {
                content: "";
                position: fixed;
                width: 100%;
                height: 100%;
                background: url('https://i.ibb.co/3TgG6dM/vine.png') repeat;
                opacity: 0.1;
            }

        /* HALAMAN AWAL */
        .start {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            text-align: center;
        }

        /* BUTTON */
        .btn {
            padding: 15px 30px;
            border-radius: 30px;
            border: none;
            background: white;
            color: #ff6f91;
            font-size: 16px;
        }

        /* CONTAINER */
        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            position: relative;
            z-index: 2;
        }

        /* TEXT (TANPA LIMIT) */
        #typing {
            white-space: pre-line;
            line-height: 1.6;
            text-align: left;
        }

        /* LOVE */
        .heart {
            position: fixed;
            z-index: 1;
            animation: floatUp 5s linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh);
            }

            100% {
                transform: translateY(-10vh);
            }
        }

        /* BALON */
        .balloon {
            position: fixed;
            width: 40px;
            height: 50px;
            border-radius: 50%;
            z-index: 1;
            animation: float 6s linear infinite;
        }

        @keyframes float {
            0% {
                bottom: -100px;
            }

            100% {
                bottom: 110%;
            }
        }

        /* HUJAN */
        .rain {
            position: fixed;
            width: 2px;
            height: 20px;
            background: rgba(255,255,255,0.5);
            z-index: 1;
            animation: rain 1s linear infinite;
        }

        @keyframes rain {
            0% {
                top: -10%;
            }

            100% {
                top: 110%;
            }
        }

        /* KUE */
        .cake {
            margin: 20px auto;
            width: 120px;
            height: 80px;
            background: #ff6f91;
            border-radius: 15px;
            position: relative;
        }

        .candle {
            width: 10px;
            height: 30px;
            background: white;
            position: absolute;
            top: -30px;
            left: 55px;
        }

        .flame {
            width: 12px;
            height: 18px;
            background: orange;
            border-radius: 50%;
            animation: flicker 0.3s infinite;
        }

        @keyframes flicker {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
            }

            100% {
                transform: scale(1);
            }
        }

        /* MEJA */
        .table {
            width: 200px;
            height: 15px;
            background: #8b5e3c;
            margin: 10px auto;
            border-radius: 10px;
        }
    </style>
</head>
